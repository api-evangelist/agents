features:
- name: Planning and Reasoning Loops
  description: Agent frameworks like LangGraph, AutoGen, and CrewAI provide structured
    loops for planning, reflection, and multi-step reasoning over user goals, breaking
    complex tasks into ordered sub-tasks.
- name: Tool Calling and Function Use
  description: Agents invoke external functions, APIs, and aggregated tool catalogs
    through provider-native tool calling, expanding their reach beyond text generation
    into real-world action.
- name: Memory and State Management
  description: Frameworks like Letta and LangGraph provide persistent memory, conversation
    state, and long-running execution context so agents can resume work, remember
    users, and accumulate knowledge over time.
- name: Multi-Agent Orchestration
  description: CrewAI, AutoGen, and LangGraph enable multiple specialized agents to
    collaborate, delegate sub-tasks, and reach consensus, modeling teams of role-based
    workers around a shared goal.
- name: Provider-Native Agent Runtimes
  description: OpenAI Assistants, Anthropic Claude tool use, Google ADK, Amazon Bedrock
    Agents, and Microsoft Azure AI Foundry expose first-party agent runtimes that
    handle planning, tool invocation, and state on the model provider side.
- name: Browser and Web Agents
  description: Agents like AgentQL and browser-driving frameworks let LLMs navigate
    real web pages, fill forms, and extract structured data, extending agent reach
    to systems that lack APIs.
- name: Observability and Evaluation
  description: Platforms like Portkey, TrueFoundry, and Bifrost provide tracing, evaluation,
    cost tracking, and gateway routing across agent runs to make agent behavior observable
    and debuggable.
- name: Open Governance and Interoperability
  description: The Linux Foundation Agentic AI Foundation and projects like kagent
    and AgentGateway are establishing open standards for agent-to-agent communication,
    identity, and runtime portability.
use_cases:
- name: Customer Support Automation
  description: Hosted agent platforms like Lindy, Relevance AI, and Microsoft Power
    Virtual Agents handle inbound support tickets, route conversations, and resolve
    common requests end-to-end.
- name: Research and Knowledge Work
  description: LangChain and LlamaIndex agents combine retrieval over enterprise documents
    with reasoning to answer complex questions and synthesize multi-source briefings.
- name: Sales and Outbound Workflows
  description: Agents built on Lindy, Relevance AI, and Composio prospect leads, draft
    outreach, log CRM activity, and orchestrate multi-step sales sequences.
- name: Software Engineering Agents
  description: AutoGPT, AutoGen, and CrewAI-based engineering agents read repositories,
    draft pull requests, run tests, and iterate on code under human review.
- name: Voice and Telephony Agents
  description: LiveKit and similar runtimes power real-time voice agents that handle
    phone calls, meetings, and live conversations using streaming LLMs and tool calling.
- name: Internal Operations and IT Automation
  description: Agentic platforms like Restack, Trigger.dev, and Stackmint orchestrate
    long-running internal workflows across SaaS, databases, and identity systems.
- name: Multi-Agent Team Simulations
  description: CrewAI and AutoGen model role-based teams (researcher, writer, reviewer)
    collaborating on a single deliverable, producing higher-quality output than a
    single agent.
integrations:
- name: LangChain
  description: The most widely used open-source framework for building LLM applications,
    including chains, agents, retrieval, memory, and tool calling across dozens of
    providers.
- name: LangGraph
  description: A graph-based runtime from LangChain for stateful, multi-actor, long-running
    agent workflows with checkpointing and human-in-the-loop.
- name: CrewAI
  description: Multi-agent framework for orchestrating role-based agent crews that
    collaborate on complex tasks.
- name: AutoGen
  description: Microsoft's open-source framework for building multi-agent conversations
    with planner, executor, and critic roles.
- name: Composio
  description: Agent execution platform exposing 1000+ apps as governed tools for
    any agent framework or model.
- name: Letta
  description: Stateful agent platform (formerly MemGPT) focused on long-term memory
    and persistent agent identity.
- name: OpenAI Assistants
  description: OpenAI's hosted agent runtime with built-in tool use, retrieval, code
    interpreter, and threads.
- name: Amazon Bedrock Agents
  description: AWS's managed agent runtime over foundation models with action groups,
    knowledge bases, and guardrails.
